    Android adaptive icon foreground.
    The OS clips this with a circle/squircle/etc, keep all art inside the
    inner 66 percent safe zone (centered 672 by 672 box at offset 176, 176).
    Background is supplied by app.json (#F5F1EA), so this layer is the
    plant motif only, with no background fill.
  -->

